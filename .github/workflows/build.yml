name: build
on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  binarios:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install . pyinstaller
      - run: pyinstaller --onefile --windowed --paths . --name HorarioSAES-${{ runner.os }} horario_saes/main.py
      - uses: actions/upload-artifact@v4
        with:
          name: HorarioSAES-${{ runner.os }}
          path: dist/*
      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: dist/*
